<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GBG Steam Bulk Renamer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      background: #1b2838;
      color: #c6d4df;
      font-family: 'Segoe UI', sans-serif;
      font-size: 13px;
    }

    header {
      background: #171a21;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #2a3f5f;
    }
    header h1 { font-size: 15px; color: #66c0f4; font-weight: 600; }
    header span { font-size: 11px; color: #7a9bb5; margin-left: auto; }

    .body { padding: 14px 16px; }

    label { display: block; font-size: 11px; color: #7a9bb5; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px; }

    textarea {
      width: 100%;
      height: 160px;
      background: #131a21;
      border: 1px solid #2a3f5f;
      border-radius: 4px;
      color: #c6d4df;
      font-size: 12px;
      font-family: monospace;
      padding: 8px;
      resize: vertical;
      outline: none;
    }
    textarea:focus { border-color: #66c0f4; }

    .hint {
      margin-top: 6px;
      font-size: 11px;
      color: #556677;
    }

    .actions { margin-top: 14px; display: flex; gap: 8px; }

    button {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: opacity .15s;
    }
    button:hover { opacity: .85; }
    button:disabled { opacity: .4; cursor: not-allowed; }

    #btnRename { background: #4c8dae; color: #fff; }
    #btnClear  { background: #2a3f5f; color: #c6d4df; flex: 0 0 80px; }

    #status {
      margin-top: 12px;
      min-height: 36px;
      background: #131a21;
      border-radius: 4px;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.5;
      border: 1px solid #2a3f5f;
      white-space: pre-wrap;
    }
    .ok   { color: #57f287; }
    .err  { color: #ed4245; }
    .info { color: #66c0f4; }

    #log {
      margin-top: 10px;
      max-height: 120px;
      overflow-y: auto;
      background: #131a21;
      border: 1px solid #2a3f5f;
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 11px;
      font-family: monospace;
      display: none;
    }
    #log p { margin: 2px 0; }
  </style>
</head>
<body>
  <header>
    <h1>⚙️ GBG Bulk Renamer</h1>
    <span id="friendCount"></span>
  </header>

  <div class="body">
    <label>Nickname list</label>
    <textarea id="list" placeholder="SteamID64 | Nickname&#10;76561198XXXXXXXXX | GBG.Ghosterino&#10;76561198YYYYYYYYY | GBG.Player2&#10;&#10;or&#10;&#10;vanityname | GBG.Ghosterino"></textarea>
    <p class="hint">One entry per line — <code>SteamID64 | Nickname</code> or <code>vanity | Nickname</code></p>

    <div class="actions">
      <button id="btnRename">🔄 Rename All</button>
      <button id="btnClear">Clear</button>
    </div>

    <div id="status" class="info">Open your Steam profile page, then click Rename All.</div>
    <div id="log"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
